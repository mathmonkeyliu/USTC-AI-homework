seed: 42

data:
  root: data
  batch_size: 64
  num_workers: 2

model:
  model_name: MNISTCNN2
  conv1_channels: 32
  conv2_channels: 64
  conv3_channels: 128
  hidden_size: 256
  dropout: 0.5

train:
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  log_interval: 100
  save_dir: model
  save_name: mnist_cnn_config_8_model_2.pth
  tensorboard_dir: runs/config_8_model_2
  log_path: logs/config_8_model_2.log

predict:
  image_dir: data/numbersbyHAND
  checkpoint: model/mnist_cnn_config_8_model_2.pth
  invert: true
