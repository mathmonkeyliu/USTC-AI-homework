seed: 42

data:
  root: data
  batch_size: 64
  num_workers: 2

model:
  model_name: MNISTCNN1
  conv1_channels: 32
  conv2_channels: 64
  hidden_size: 128
  dropout: 0.3

train:
  epochs: 10
  learning_rate: 0.0005
  weight_decay: 0.0
  log_interval: 100
  save_dir: model
  save_name: mnist_cnn_config_1_model_1.pth
  tensorboard_dir: runs/config_1_model_1
  log_path: logs/config_1_model_1.log

predict:
  image_dir: data/numbersbyHAND
  checkpoint: model/mnist_cnn_config_1_model_1.pth
  invert: true
